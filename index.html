<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- This viewport tag is what makes it behave on a phone screen instead of zoomed-out desktop view -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPS Tracker.exe</title>
  <!-- Leaflet's CSS — handles map tile layout, zoom controls, marker icons -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- This whole div is styled to look like a classic Win95 application window -->
  <div class="window">

    <!-- Title bar: the colored strip at the top with fake window buttons -->
    <div class="title-bar">
      <span class="title-bar-text">📍 GPS Tracker.exe</span>
      <div class="title-bar-controls">
        <button aria-label="Minimize">_</button>
        <button aria-label="Maximize">▢</button>
        <button aria-label="Close">X</button>
      </div>
    </div>

    <!-- window-body holds the actual app content -->
    <div class="window-body">

      <p class="intro-text">Click the button below and allow location access.</p>

      <!-- This is the button we wire up in app.js -->
      <button id="startBtn" class="win95-button">▶ Start GPS</button>

      <!-- A little "sunken" panel, like an old Win95 list box, to show the data -->
      <div class="output-box">
        <p>Latitude: <span id="lat">--</span></p>
        <p>Longitude: <span id="lng">--</span></p>
        <p>Accuracy: <span id="acc">--</span> meters</p>
      </div>

      <!-- Leaflet draws the actual map inside this div. It starts empty/grey
           until app.js calls L.map() on it after we have coordinates. -->
      <div id="map"></div>

      <!-- Status messages / errors show up here -->
      <p id="status" class="status-text"></p>

    </div>
  </div>

  <!-- Leaflet's JS must load BEFORE app.js, since app.js uses the global "L" object it provides -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
