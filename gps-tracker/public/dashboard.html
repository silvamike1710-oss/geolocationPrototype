<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard.exe</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="window">
    <div class="title-bar">
      <span class="title-bar-text">📡 Dashboard.exe</span>
      <div class="title-bar-controls">
        <button aria-label="Minimize">_</button>
        <button aria-label="Maximize">▢</button>
        <button aria-label="Close">X</button>
      </div>
    </div>

    <div class="window-body">
      <p class="intro-text">Tracked devices:</p>

      <!-- Filled in dynamically by dashboard.js — one row per device -->
      <div id="deviceList" class="output-box device-list">
        <p>Waiting for devices...</p>
      </div>

      <div id="map"></div>

      <p id="status" class="status-text"></p>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
